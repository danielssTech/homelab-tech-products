upstream project1_app {
    server 192.168.133.1:8000;  # IP:puerto de tu app FastAPI
}

server {
    listen 80;
    server_name _;

    root   /var/www/techProducts/html;
    index  index.html;

    # gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;
    gzip_min_length 1024;

    # headers de seguridad básicos
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; script-src 'self'; style-src 'self' 'unsafe-inline'" always;

    client_max_body_size 10M;

    # páginas de error
    error_page 502 503 504 /50x.html;
    location = /50x.html { internal; }

    # landing estática
    location = / { try_files $uri /index.html; }
    location /  { try_files $uri $uri/ /index.html; expires 10m; }

    # proxy /api → FastAPI
    location /api/ {
        proxy_pass         http://project1_app/;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # websockets (si usas /api/ws)
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        proxy_connect_timeout 5s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
    }
}